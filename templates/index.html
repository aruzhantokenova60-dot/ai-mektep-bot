<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<title>AI Мектеп көмекшісі</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

<h1>🤖 AI Мектеп көмекшісі</h1>

<div class="card">

<h2>Чат</h2>

<form action="/chat" method="post">
<input type="text" name="message"
placeholder="Сұрағыңызды жазыңыз">
<button type="submit">Жіберу</button>
</form>

{% if answer %}
<p><b>Жауап:</b> {{ answer }}</p>
{% endif %}

</div>

<div class="card">

<h2>Бағаны болжау</h2>

<form action="/predict" method="post">
<input type="number"
name="attendance"
placeholder="Қатысу %">
<button type="submit">Есептеу</button>
</form>

{% if grade %}
<p>Болжамды баға: {{ grade }}</p>
{% endif %}

</div>

<div class="card">

<h2>Үлгерімді анықтау</h2>

<form action="/classify" method="post">
<input type="number"
name="score"
placeholder="Орташа балл">
<button type="submit">Тексеру</button>
</form>

{% if level %}
<p>Деңгей: {{ level }}</p>
{% endif %}

</div>

</div>

</body>
</html>
